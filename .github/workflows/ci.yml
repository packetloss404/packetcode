name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.3'
  GOLANGCI_LINT_VERSION: v2.9.0
  GOVULNCHECK_VERSION: v1.3.0
  GORELEASER_VERSION: v2.9.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_flags: '-race -coverprofile=coverage.out'
          - os: macos-latest
            test_flags: ''
          - os: windows-latest
            test_flags: ''
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod verify
      - run: go test -count=1 ${{ matrix.test_flags }} ./...

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -trimpath \
            -ldflags "-s -w -X main.version=ci -X main.commit=${GITHUB_SHA::7}" \
            -o "dist/packetcode-${GOOS}-${GOARCH}${ext}" \
            ./cmd/packetcode

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: ''
            binary: ./packetcode
          - os: macos-latest
            exe: ''
            binary: ./packetcode
          - os: windows-latest
            exe: '.exe'
            binary: '.\packetcode.exe'
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build native CLI
        run: go build -trimpath -ldflags "-s -w -X main.version=ci -X main.commit=${{ github.sha }}" -o packetcode${{ matrix.exe }} ./cmd/packetcode
      - name: Smoke version
        run: ${{ matrix.binary }} --version
      - name: Smoke help
        run: ${{ matrix.binary }} --help

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: goreleaser/goreleaser-action@v7.2.1
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: check

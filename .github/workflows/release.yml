name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GO_VERSION: '1.26.3'
  GORELEASER_VERSION: v2.9.0

jobs:
  preflight:
    name: preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: ''
            binary: ./packetcode
            test_flags: '-race'
          - os: macos-latest
            exe: ''
            binary: ./packetcode
            test_flags: ''
          - os: windows-latest
            exe: '.exe'
            binary: '.\packetcode.exe'
            test_flags: ''
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod verify
      - run: go test -count=1 ${{ matrix.test_flags }} ./...
      - run: go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" -o packetcode${{ matrix.exe }} ./cmd/packetcode
      - run: ${{ matrix.binary }} --version
      - run: ${{ matrix.binary }} --help

  release:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod verify
      - run: go test -race -count=1 ./...
      - uses: goreleaser/goreleaser-action@v7.2.1
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
